name: Deploy to Tencent HK Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static files
        run: |
          mkdir -p _site
          cp *.html content.json news.json news-learning.json styles.css script.js news.js comments.js CNAME vercel.json _site/

      - name: Deploy static site
        env:
          # Public origin for www.ori-lin.com; keep automation on the serving host.
          TENCENT_HOST: 43.132.148.35
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          TENCENT_PORT: ${{ secrets.TENCENT_PORT || 22 }}
          TENCENT_SSH_PRIVATE_KEY: ${{ secrets.TENCENT_SSH_PRIVATE_KEY }}
          # Keep deployment aligned with deploy/tencent-hk-nginx.conf.
          TENCENT_SITE_PATH: /var/www/ori-lin-site
        run: |
          set -euo pipefail
          if [ -z "$TENCENT_HOST" ] || [ -z "$TENCENT_USER" ] || [ -z "$TENCENT_SSH_PRIVATE_KEY" ] || [ -z "$TENCENT_SITE_PATH" ]; then
            echo "Tencent SSH secrets are not configured; skipping SSH upload."
            exit 0
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$TENCENT_SSH_PRIVATE_KEY" > ~/.ssh/ori_linin_deploy_key
          chmod 600 ~/.ssh/ori_linin_deploy_key
          ssh -i ~/.ssh/ori_linin_deploy_key -p "$TENCENT_PORT" -o StrictHostKeyChecking=no "$TENCENT_USER@$TENCENT_HOST" "mkdir -p '$TENCENT_SITE_PATH'"
          scp -i ~/.ssh/ori_linin_deploy_key -P "$TENCENT_PORT" -o StrictHostKeyChecking=no _site/* "$TENCENT_USER@$TENCENT_HOST:$TENCENT_SITE_PATH/"
          ssh -i ~/.ssh/ori_linin_deploy_key -p "$TENCENT_PORT" -o StrictHostKeyChecking=no "$TENCENT_USER@$TENCENT_HOST" "test -n '$TENCENT_SITE_PATH' && test '$TENCENT_SITE_PATH' != '/' && rm -f '$TENCENT_SITE_PATH/day-021.html' '$TENCENT_SITE_PATH/day-022.html'"
          ssh -i ~/.ssh/ori_linin_deploy_key -p "$TENCENT_PORT" -o StrictHostKeyChecking=no "$TENCENT_USER@$TENCENT_HOST" "test -s '$TENCENT_SITE_PATH/index.html' && test -s '$TENCENT_SITE_PATH/day-020.html'"

      - name: Create WeChat draft when requested
        if: contains(github.event.head_commit.message, '[wechat-draft]')
        env:
          TENCENT_HOST: 43.132.148.35
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          TENCENT_PORT: ${{ secrets.TENCENT_PORT || 22 }}
          TENCENT_SSH_PRIVATE_KEY: ${{ secrets.TENCENT_SSH_PRIVATE_KEY }}
          TENCENT_SITE_PATH: /var/www/ori-lin-site
        run: |
          set -euo pipefail
          WECHAT_DIR=/tmp/ori-lin-wechat
          ssh -i ~/.ssh/ori_linin_deploy_key -p "$TENCENT_PORT" -o StrictHostKeyChecking=no "$TENCENT_USER@$TENCENT_HOST" "mkdir -p '$WECHAT_DIR' && test -s '$TENCENT_SITE_PATH/.env'"
          scp -i ~/.ssh/ori_linin_deploy_key -P "$TENCENT_PORT" -o StrictHostKeyChecking=no wechat_sync.py wechat_news_sync.py news.json "$TENCENT_USER@$TENCENT_HOST:$WECHAT_DIR/"
          ssh -i ~/.ssh/ori_linin_deploy_key -p "$TENCENT_PORT" -o StrictHostKeyChecking=no "$TENCENT_USER@$TENCENT_HOST" "cp '$TENCENT_SITE_PATH/.env' '$WECHAT_DIR/.env' && chmod 600 '$WECHAT_DIR/.env' && cd '$WECHAT_DIR' && python3 wechat_news_sync.py --draft-only"

      - name: Verify public site
        run: |
          set -euo pipefail
          curl -fsSL https://www.ori-lin.com/ | grep -q 'day-020.html'
          curl -fsSL -H 'Cache-Control: no-cache' "https://www.ori-lin.com/day-020.html?deploy=${GITHUB_SHA}" | grep -q '从细木数子到曲曲：谁在替东亚社会生产确定性？'
