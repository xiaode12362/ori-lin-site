name: Deploy to Tencent HK Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static files
        run: |
          mkdir -p _site
          cp *.html *.css *.js *.json *.xml robots.txt CNAME _site/
          if [ -d assets ]; then cp -R assets _site/assets; fi
          if [ -d comments-server ]; then cp -R comments-server _site/comments-server; fi

      - name: Deploy static site
        env:
          # Public origin for www.ori-lin.com; keep automation on the serving host.
          TENCENT_HOST: 43.132.148.35
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          TENCENT_PORT: ${{ secrets.TENCENT_PORT || 22 }}
          TENCENT_SSH_PRIVATE_KEY: ${{ secrets.TENCENT_SSH_PRIVATE_KEY }}
          # Keep deployment aligned with deploy/tencent-hk-nginx.conf.
          TENCENT_SITE_PATH: /var/www/ori-lin-site
        run: |
          set -euo pipefail
          if [ -z "$TENCENT_HOST" ] || [ -z "$TENCENT_USER" ] || [ -z "$TENCENT_SSH_PRIVATE_KEY" ] || [ -z "$TENCENT_SITE_PATH" ]; then
            echo "Tencent SSH secrets are not configured; skipping SSH upload."
            exit 0
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$TENCENT_SSH_PRIVATE_KEY" > ~/.ssh/ori_linin_deploy_key
          chmod 600 ~/.ssh/ori_linin_deploy_key
          ssh -i ~/.ssh/ori_linin_deploy_key -p "$TENCENT_PORT" -o StrictHostKeyChecking=no "$TENCENT_USER@$TENCENT_HOST" "mkdir -p '$TENCENT_SITE_PATH'"
          scp -r -i ~/.ssh/ori_linin_deploy_key -P "$TENCENT_PORT" -o StrictHostKeyChecking=no _site/. "$TENCENT_USER@$TENCENT_HOST:$TENCENT_SITE_PATH/"
          ssh -i ~/.ssh/ori_linin_deploy_key -p "$TENCENT_PORT" -o StrictHostKeyChecking=no "$TENCENT_USER@$TENCENT_HOST" "if systemctl list-unit-files | grep -q '^ori-lin-comments.service'; then cd '$TENCENT_SITE_PATH/comments-server' && npm install --omit=dev && systemctl restart ori-lin-comments; fi"
          ssh -i ~/.ssh/ori_linin_deploy_key -p "$TENCENT_PORT" -o StrictHostKeyChecking=no "$TENCENT_USER@$TENCENT_HOST" "test -s '$TENCENT_SITE_PATH/index.html' && test -s '$TENCENT_SITE_PATH/day-022.html' && test -s '$TENCENT_SITE_PATH/assets/industry-choice-market-cap.png'"

      - name: Verify public site
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            cache_bust="${GITHUB_SHA}-${attempt}"
            if curl -fsSL "https://www.ori-lin.com/index.html?deploy=${cache_bust}" -o /tmp/ori-home.html \
              && curl -fsSL "https://www.ori-lin.com/day-022.html?deploy=${cache_bust}" -o /tmp/ori-day-022.html \
              && grep -q 'day-022.html' /tmp/ori-home.html \
              && grep -q 'Day 022' /tmp/ori-day-022.html; then
              exit 0
            fi
            sleep 12
          done
          echo "Public site did not update to Day 022 in time"
          exit 1
