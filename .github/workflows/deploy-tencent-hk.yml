name: Deploy to Tencent HK Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static files
        run: |
          mkdir -p _site
          cp *.html styles.css script.js comments.js CNAME vercel.json _site/

      - name: Deploy static site
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          key: ${{ secrets.TENCENT_SSH_PRIVATE_KEY }}
          source: "_site/*"
          target: ${{ secrets.TENCENT_SITE_PATH }}
          strip_components: 1
